<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#38bdf8" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>
    
    <!-- Accent Gradient -->
    <linearGradient id="glowGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="100%" stop-color="#38bdf8" />
    </linearGradient>

    <!-- Shadow Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#818cf8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Outer Ring (Radar / Orbit) -->
  <circle cx="50" cy="50" r="42" fill="none" stroke="url(#bgGrad)" stroke-width="2" stroke-opacity="0.4" stroke-dasharray="4 6" />

  <!-- Main Shield Hexagon -->
  <polygon points="50,15 82,30 82,70 50,85 18,70 18,30" fill="#09090b" stroke="url(#bgGrad)" stroke-width="3" filter="url(#shadow)" />

  <!-- Inner Sparkle/AI Icon -->
  <path d="M50,32 L53,42 L63,45 L53,48 L50,58 L47,48 L37,45 L47,42 Z" fill="url(#glowGrad)" />

  <!-- Orbiting Nodes representing automated checks -->
  <circle cx="82" cy="30" r="3" fill="#38bdf8" />
  <circle cx="18" cy="70" r="3" fill="#818cf8" />
  <circle cx="50" cy="85" r="3" fill="#c084fc" />
</svg>
